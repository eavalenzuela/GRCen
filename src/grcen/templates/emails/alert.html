{% extends "emails/_layout.html" %}
{% block content %}
<h2 style="margin:0 0 12px 0;font-size:20px;color:#111827;">{{ alert.title }}</h2>
{% if alert.message %}
<p style="margin:0 0 16px 0;">{{ alert.message }}</p>
{% endif %}
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 16px 0;font-size:14px;">
    <tr>
        <td style="padding:4px 12px 4px 0;color:#6b7280;">Asset</td>
        <td style="padding:4px 0;"><a href="{{ link }}" style="color:#1f4ed8;text-decoration:none;">{{ asset_name }}</a></td>
    </tr>
</table>
<p style="margin:0;">
    <a href="{{ link }}" style="display:inline-block;padding:10px 18px;background:#1f4ed8;color:#ffffff;text-decoration:none;border-radius:4px;font-weight:500;">Open in {{ app_name }}</a>
</p>
{% endblock %}
