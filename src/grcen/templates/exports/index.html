{% extends "base.html" %}
{% block title %}Export - GRCen{% endblock %}
{% block content %}
<h1>Export Assets</h1>

<div class="card">
    <form id="export-form" method="get" action="/api/exports/assets">
        <div class="form-group">
            <label>Format</label>
            <select name="format">
                <option value="csv">CSV</option>
                <option value="json">JSON</option>
            </select>
        </div>

        <div class="form-group">
            <label>Asset Types (comma-separated, or leave blank for all)</label>
            <input type="text" name="types" placeholder="e.g. person,system,risk">
            <small>Available: {% for t in asset_types %}{{ t.value }}{% if not loop.last %}, {% endif %}{% endfor %}</small>
        </div>

        <div class="form-group">
            <label>Status Filter</label>
            <select name="status">
                <option value="">All</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
                <option value="draft">Draft</option>
                <option value="archived">Archived</option>
            </select>
        </div>

        <div class="form-group">
            <label>Columns (comma-separated, or leave blank for all)</label>
            <input type="text" name="columns" placeholder="e.g. id,name,type,status">
        </div>

        <button type="submit" class="btn btn-primary">Download Export</button>
    </form>
</div>
{% endblock %}
