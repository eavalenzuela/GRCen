# GRCen production nginx reverse proxy with TLS termination
#
# Usage:
#   1. Place your certificate and key at the paths below (or update the paths)
#   2. Replace "grcen.example.com" with your domain
#   3. Use docker-compose.prod.yml which includes this nginx service

upstream grcen_app {
    server app:8000;
}

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name grcen.example.com;

    # Allow ACME challenges for cert renewal (e.g. certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name grcen.example.com;

    # --- TLS certificates ---
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # --- TLS protocol & cipher hardening ---
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # Session resumption for performance
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- Security headers (supplement app-level headers) ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # --- Proxy settings ---
    location / {
        proxy_pass http://grcen_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Upload size limit (match app setting)
        client_max_body_size 50m;
    }

    # Serve static files directly for performance (optional)
    location /static/ {
        alias /app/src/grcen/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
