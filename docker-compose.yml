services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grcen
      POSTGRES_PASSWORD: grcen
      POSTGRES_DB: grcen
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grcen"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8443:8443"
    environment:
      DATABASE_URL: postgresql://grcen:grcen@db:5432/grcen
      SECRET_KEY: "${SECRET_KEY:?Set SECRET_KEY in .env}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-}"
      DEBUG: "${DEBUG:-false}"
      UPLOAD_DIR: /app/uploads
      SSL_CERTFILE: "${SSL_CERTFILE:-}"
      SSL_KEYFILE: "${SSL_KEYFILE:-}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ./certs:/certs:ro

volumes:
  pgdata:
  uploads:
