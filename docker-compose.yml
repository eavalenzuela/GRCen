services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grcen
      POSTGRES_PASSWORD: grcen
      POSTGRES_DB: grcen
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grcen"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://grcen:grcen@db:5432/grcen
      SECRET_KEY: change-me-in-production
      DEBUG: "false"
      UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
